services:
  - type: web
    name: khu-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: VAPID_PRIVATE_KEY_PEM
        sync: false
      - key: VAPID_PUBLIC_KEY_B64URL
        sync: false
      - key: VAPID_CONTACT_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
